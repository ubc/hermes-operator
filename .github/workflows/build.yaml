name: Build
on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      # Multi-arch builds for releases happen in release.yaml via
      # docker/build-push-action (uses Go cross-compile under
      # BUILDPLATFORM, not QEMU). This job is a fast PR smoke test:
      # single-platform, host-arch.
      - uses: docker/login-action@v4
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/ubc/hermes-operator:dev,ghcr.io/ubc/hermes-operator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
