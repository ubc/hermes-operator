name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user-facing problem, not the implementation. Skip if this is a pure DX/quality-of-life improvement.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would this look from the user's perspective? Sketch CRD fields, CLI flags, condition reasons, etc.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/ubc/hermes-operator/blob/main/CODE_OF_CONDUCT.md).
          required: true
