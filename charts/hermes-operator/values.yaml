image:
  repository: ghcr.io/stubbi/hermes-operator
  tag: 0.1.1
  pullPolicy: IfNotPresent
logLevel: info
createRBAC: true
watchNamespaces: []
metrics:
  secure: true
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
webhook:
  enabled: true
  port: 9443
  certManager:
    enabled: true
    issuerKind: Issuer
    issuerName: hermes-operator-selfsigned
  caBundle: ''
  servingCertSecretName: hermes-operator-webhook-server-cert
agentImage:
  repository: ghcr.io/stubbi/hermes-agent
  tag: v0.13.0
  pullPolicy: IfNotPresent
honchoImage:
  repository: ghcr.io/plastic-labs/honcho
  tag: 0.1.0
gatewayEgressEndpoints:
  telegram:
    - api.telegram.org
  discord:
    - discord.com
    - gateway.discord.gg
  slack:
    - slack.com
    - wss-primary.slack.com
  whatsapp:
    - graph.facebook.com
  signal:
    - chat.signal.org
