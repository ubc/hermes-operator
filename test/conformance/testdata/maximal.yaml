apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: conformance-maximal
  annotations:
    hermes.agent/test: "conformance-maximal"
spec:
  image:
    repository: ghcr.io/ubc/hermes-agent
    tag: "v0.16.0"
    pullPolicy: IfNotPresent
  storage:
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: standard
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  security:
    rbac:
      createServiceAccount: true
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/hermes-role
    networkPolicy:
      enabled: true
      allowDNS: true
      allowedEgressCIDRs:
        - 10.0.0.0/8
  networking:
    service:
      type: ClusterIP
      ports:
        - name: gateway
          port: 8443
          protocol: TCP
    ingress:
      enabled: true
      host: hermes-maximal.example.com
      className: nginx
      pathType: Prefix
      path: /
      servicePortName: gateway
      tls:
        - secretName: hermes-maximal-tls
          hosts:
            - hermes-maximal.example.com
  observability:
    metrics:
      enabled: true
      port: 9090
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s
    logging:
      format: json
      level: info
  availability:
    podDisruptionBudget:
      enabled: true
      maxUnavailable: 1
    horizontalPodAutoscaler:
      enabled: true
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilization: 80
  probes:
    liveness:
      httpGet:
        path: /health
        port: 8443
      initialDelaySeconds: 30
      periodSeconds: 10
    readiness:
      httpGet:
        path: /health
        port: 8443
      initialDelaySeconds: 10
      periodSeconds: 5
  scheduling:
    nodeSelector:
      kubernetes.io/os: linux
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: Exists
        effect: NoSchedule
  env:
    - name: HERMES_LOG_LEVEL
      value: info
    - name: HERMES_ENV
      value: conformance
  envFrom:
    - secretRef:
        name: hermes-maximal-extra-env
  sidecars:
    - name: log-shipper
      image: fluent/fluent-bit:latest
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
  runtime:
    python: "3.11"
    uv:
      enabled: true
    ffmpeg:
      enabled: true
    ripgrep:
      enabled: true
