apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: conformance-selfconfig
spec:
  image:
    repository: ghcr.io/paperclipinc/hermes-agent
    tag: "v2026.5.29.2"
  storage:
    persistence:
      enabled: true
      size: 1Gi
  selfConfigure:
    enabled: true
    protectedKeys:
      - image
      - storage.persistence.size
    allowedActions:
      - skills
      - config
      - envVars
      - workspaceFiles
      - profiles
