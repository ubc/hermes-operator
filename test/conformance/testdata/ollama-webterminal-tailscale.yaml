apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: conformance-sidecars
spec:
  image:
    repository: ghcr.io/paperclipinc/hermes-agent
    tag: "v2026.5.29.2"
  storage:
    persistence:
      enabled: true
      size: 5Gi
  sidecars:
    - name: ollama
      image: ollama/ollama:latest
      ports:
        - containerPort: 11434
          name: ollama
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
    - name: web-terminal
      image: ghcr.io/paperclipinc/hermes-web-terminal:latest
      ports:
        - containerPort: 7681
          name: web-terminal
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
  tailscale:
    enabled: true
    mode: serve
    authKey:
      secretRef:
        name: conformance-tailscale-auth
        key: authKey
---
# Dummy auth key so the operator-managed tailscale sidecar's TS_AUTHKEY
# secretKeyRef resolves and the pod can start on a live conformance cluster.
# The HermesInstance doc must stay first: extractName() in idempotency_test.go
# picks the first metadata.name in the file.
apiVersion: v1
kind: Secret
metadata:
  name: conformance-tailscale-auth
type: Opaque
stringData:
  authKey: "tskey-dummy-not-a-real-key"
