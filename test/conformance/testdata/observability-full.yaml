apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: conformance-observability
spec:
  image:
    repository: ghcr.io/ubc/hermes-agent
    tag: "v0.16.0"
  storage:
    persistence:
      enabled: true
      size: 1Gi
  observability:
    metrics:
      enabled: true
      port: 9090
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s
      labels:
        release: kube-prometheus-stack
    prometheusRule:
      enabled: true
