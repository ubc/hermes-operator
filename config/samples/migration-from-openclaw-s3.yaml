apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: hermes-migrated-from-s3
spec:
  image:
    repository: ghcr.io/ubc/hermes-agent
    tag: 1.0.0
  storage:
    persistence:
      enabled: true
      size: 10Gi
  migration:
    fromOpenClaw:
      mode: copy
      source:
        backupRef:
          s3:
            bucket: openclaw-backups
            endpoint: s3.amazonaws.com
            region: us-east-1
            key: prod/my-openclaw/2026-05-11.tar.zst
            credentialsSecretRef:
              name: oc-s3-creds
