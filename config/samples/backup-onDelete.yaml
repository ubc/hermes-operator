apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: hermes-backup-ondelete
spec:
  image:
    repository: ghcr.io/ubc/hermes-agent
    tag: 1.0.0
  storage:
    persistence:
      enabled: true
      size: 5Gi
  backup:
    onDelete: true
    s3:
      bucket: hermes-backups
      endpoint: s3.amazonaws.com
      region: us-east-1
      credentialsSecretRef:
        name: hermes-s3-creds
