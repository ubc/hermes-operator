apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: auto-update
spec:
  image:
    repository: ghcr.io/ubc/hermes-agent
    tag: "v2026.5.29.2"
  storage:
    persistence:
      enabled: true
      size: 10Gi
  backup:
    s3:
      bucket: hermes-backups
      endpoint: s3.amazonaws.com
      region: us-east-1
      pathPrefix: prod/
      credentialsSecretRef:
        name: hermes-s3-creds
    historyLimit: 10
  autoUpdate:
    enabled: true
    source:
      registry: ghcr.io/ubc/hermes-agent
      channel: "1.x"
    pollInterval: 1h
    rollback:
      enabled: true
      probeFailureThreshold: 3
      deadlineMinutes: 5
    backupBeforeUpdate: true
